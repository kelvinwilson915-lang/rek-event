<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>You're in the Right Place — Join Now</title>
  <meta name="description" content="You've seen the opportunity. Take the next step and join our WhatsApp group to secure your seat.">
  <meta name="theme-color" content="#fafafa">
  <link rel="icon" href="data:,">

  <!-- INLINE CRITICAL CSS — zero render-blocking requests -->
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;color:#1a1a1a;line-height:1.6;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}

    .page-wrapper{width:100%;max-width:520px;padding:0 20px;display:flex;flex-direction:column;align-items:center;flex:1}

    /* Headline */
    .headline{margin-top:clamp(32px,8vh,56px);margin-bottom:clamp(24px,5vh,40px);text-align:center}
    .headline h1{font-size:clamp(1.6rem,5.5vw,2.2rem);font-weight:700;color:#111;letter-spacing:-.02em;line-height:1.25;opacity:0;animation:fadeUp .7s ease-out .15s forwards}

    /* Video */
    .video-container{width:100%;border-radius:16px;overflow:hidden;background:#000;box-shadow:0 8px 30px rgba(0,0,0,.08);margin-bottom:clamp(24px,5vh,40px);opacity:0;animation:fadeUp .7s ease-out .35s forwards;position:relative}
    .video-aspect{position:relative;width:100%;padding-top:177.78%}
    .video-aspect video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1}
    .video-placeholder{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(145deg,#111,#1a1a1a);color:#fff;gap:14px;z-index:0}
    .video-placeholder .play-icon{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center}
    .video-placeholder .play-icon svg{width:30px;height:30px;fill:#fff;margin-left:3px}
    .video-placeholder span{font-size:.9rem;color:rgba(255,255,255,.45);font-weight:500;letter-spacing:.02em}

    /* Short text */
    .short-text{text-align:center;margin-bottom:clamp(24px,5vh,36px);opacity:0;animation:fadeUp .7s ease-out .55s forwards}
    .short-text p{font-size:clamp(.95rem,3.5vw,1.1rem);color:#333;line-height:1.7;margin-bottom:8px;font-weight:400}
    .short-text p:last-child{margin-bottom:0}
    .short-text .cta-line{font-weight:600;color:#1a1a1a;margin-top:16px;font-size:clamp(1rem,3.8vw,1.15rem)}

    /* CTA Button */
    .cta-wrapper{width:100%;margin-bottom:16px;opacity:0;animation:fadeUp .7s ease-out .7s forwards,softPulse 2.8s ease-in-out 1.5s infinite}
    .cta-button{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px 32px;background:#25D366;color:#fff;font-size:clamp(1.05rem,4vw,1.2rem);font-weight:700;font-family:inherit;border:none;border-radius:14px;cursor:pointer;text-decoration:none;transition:background .25s ease,transform .2s ease,box-shadow .25s ease;box-shadow:0 4px 18px rgba(37,211,102,.3);-webkit-tap-highlight-color:transparent;letter-spacing:.01em}
    .cta-button:hover{background:#22c35e;transform:translateY(-2px);box-shadow:0 6px 24px rgba(37,211,102,.4)}
    .cta-button:active{transform:translateY(0);box-shadow:0 2px 12px rgba(37,211,102,.25)}
    .cta-button svg{width:24px;height:24px;fill:currentColor;flex-shrink:0}

    /* Urgency */
    .urgency{text-align:center;padding:8px 0 clamp(40px,8vh,60px);opacity:0;animation:fadeUp .7s ease-out .85s forwards}
    .urgency p{font-size:clamp(.8rem,3vw,.9rem);color:#777;font-weight:500;letter-spacing:.01em}

    /* Sticky mobile CTA */
    .sticky-cta{display:none}
    @media(max-width:640px){
      .sticky-cta{display:block;position:fixed;bottom:0;left:0;right:0;z-index:100;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:linear-gradient(to top,#fafafa 80%,rgba(250,250,250,0));opacity:0;transform:translateY(100%);transition:opacity .4s ease,transform .4s ease;pointer-events:none}
      .sticky-cta.visible{opacity:1;transform:translateY(0);pointer-events:auto}
      .sticky-cta .cta-button{box-shadow:0 -2px 20px rgba(37,211,102,.2),0 4px 18px rgba(37,211,102,.3)}
      body{padding-bottom:80px}
    }

    /* Animations — GPU-accelerated (transform + opacity only) */
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes softPulse{0%,100%{box-shadow:0 4px 18px rgba(37,211,102,.3)}50%{box-shadow:0 4px 28px rgba(37,211,102,.5)}}

    /* Desktop */
    @media(min-width:641px){
      .page-wrapper{padding:0 24px}
      .video-aspect{padding-top:100%}
    }
  </style>

  <!-- ASYNC Google Fonts — non-render-blocking -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <script>
    // Sticky CTA — show when main button scrolls out of view
    (function(){
      var m=document.getElementById('main-cta'),s=document.getElementById('sticky-cta');
      if(!m||!s)return;
      new IntersectionObserver(function(e){
        if(e[0].isIntersecting)s.classList.remove('visible');
        else s.classList.add('visible');
      },{threshold:.3}).observe(m);
    })();
  </script>
